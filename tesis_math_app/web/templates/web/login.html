{% load crispy_forms_tags %}
{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Simulador de Fluidos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Estilos personalizados alineados a la paleta del proyecto */
        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
        }
        .bg-image {
            /* Aqui se inserta el logo del login */
            background-image: url('{% static "img/logo_login.png" %}'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            height: 100vh;
        }
        .login-container {
            height: 100vh;
        }
        .form-section {
            padding: 3rem;
            max-width: 450px;
            width: 100%;
        }
        .btn-custom {
            /* Color verde principal del proyecto */
            background-color: #4DD161; 
            color: white;
            font-weight: bold;
            border: none;
        }
        .btn-custom:hover {
            /* Tono variante de la paleta */
            background-color: #4DD1A3; 
            color: white;
        }
        .icon-user {
            font-size: 3rem;
            color: #4DBDD1; /* Tono cian de la paleta */
            margin-bottom: 1rem;
        }
        .link-custom {
            color: #4DBDD1;
            text-decoration: none;
        }
        .link-custom:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row login-container">
        <div class="col-md-6 col-lg-7 d-none d-md-block bg-image">
            </div>

        <div class="col-md-6 col-lg-5 d-flex align-items-center justify-content-center">
            <div class="form-section text-center">
                
                <h2 class="mb-2 fw-bold">Iniciar sesión</h2>
                <div class="icon-user">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="currentColor" class="bi bi-person-circle" viewBox="0 0 16 16">
                        <path d="M11 6a3 3 0 1 1-6 0 3 3 0 0 1 6 0z"/>
                        <path fill-rule="evenodd" d="M0 8a8 8 0 1 1 16 0A8 8 0 0 1 0 8zm8-7a7 7 0 0 0-5.468 11.37C3.242 11.226 4.805 10 8 10s4.757 1.225 5.468 2.37A7 7 0 0 0 8 1z"/>
                    </svg>
                </div>

                <form method="POST" class="mt-4 text-start">
                    {% csrf_token %}
                    
                    {{ form|crispy }}

                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-custom btn-lg">Login</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

</body>
</html>
